<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <style>
      .terminal-bg { fill: #0d1117; }
      .terminal-border { fill: #1c2130; }
      .title-bar { fill: #161b22; }
      .btn-red { fill: #ff7b72; }
      .btn-yellow { fill: #d29922; }
      .btn-green { fill: #3fb950; }
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .prompt { fill: #79c0ff; }
      .command { fill: #c9d1d9; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .dim { fill: #484f58; }
      .white { fill: #c9d1d9; }
      .orange { fill: #d29922; }
      .purple { fill: #bc8cff; }
    </style>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>

  <!-- Window -->
  <rect class="terminal-border" width="960" height="540" rx="12"/>
  <rect class="terminal-bg" x="1" y="1" width="958" height="538" rx="11"/>

  <!-- Title bar -->
  <rect class="title-bar" x="1" y="1" width="958" height="36" rx="11"/>
  <rect class="terminal-bg" x="1" y="26" width="958" height="12"/>

  <!-- Window buttons -->
  <circle class="btn-red" cx="24" cy="19" r="6"/>
  <circle class="btn-yellow" cx="46" cy="19" r="6"/>
  <circle class="btn-green" cx="68" cy="19" r="6"/>

  <!-- Title -->
  <text x="480" y="23" text-anchor="middle" class="text dim" font-size="12">ORBTI Framework</text>

  <!-- Content -->
  <g transform="translate(32, 68)">
    <!-- Prompt line -->
    <text class="text prompt" font-size="14" y="0">~</text>
    <text class="text dim" font-size="14" x="16" y="0">$</text>
    <text class="text command" font-size="14" x="36" y="0">npx orbti-framework</text>

    <!-- Loop icon (simplified circular arrows representing the ORBTI loop) -->
    <g transform="translate(36, 28)">
      <!-- O -->
      <text class="text accent" font-size="42" font-weight="bold" y="42" letter-spacing="3">O</text>
      <text class="text purple" font-size="42" font-weight="bold" x="38" y="42" letter-spacing="3">R</text>
      <text class="text accent" font-size="42" font-weight="bold" x="74" y="42" letter-spacing="3">B</text>
      <text class="text purple" font-size="42" font-weight="bold" x="112" y="42" letter-spacing="3">T</text>
      <text class="text green" font-size="42" font-weight="bold" x="144" y="42" letter-spacing="3">I</text>

      <!-- Circular loop arrow -->
      <g transform="translate(200, 8)">
        <path d="M16 0 A16 16 0 1 1 0 16" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M0 16 A16 16 0 1 1 16 32" fill="none" stroke="#bc8cff" stroke-width="2.5" stroke-linecap="round"/>
        <polygon points="18,-2 12,4 22,4" fill="#58a6ff"/>
        <polygon points="-2,18 4,12 4,22" fill="#bc8cff"/>
      </g>
    </g>

    <!-- Subtitle -->
    <text class="text dim" font-size="12" y="90" letter-spacing="4">  OBSERVE · REFINE · BUILD · TEST · INTEGRATE</text>

    <!-- Separator line -->
    <line x1="12" y1="108" x2="500" y2="108" stroke="#1c2130" stroke-width="1"/>

    <!-- Version info -->
    <text class="text white" font-size="14" y="132">  ORBTI Framework <tspan class="dim">v0.1.0</tspan></text>
    <text class="text dim" font-size="13" y="154">  AI-Assisted Development Loop for Claude Code</text>

    <!-- Install output -->
    <text class="text" font-size="14" y="192"><tspan class="green">  ✓</tspan><tspan class="white"> Installed commands/orbti</tspan></text>
    <text class="text" font-size="14" y="214"><tspan class="green">  ✓</tspan><tspan class="white"> Installed orbti-framework</tspan></text>
    <text class="text" font-size="14" y="236"><tspan class="green">  ✓</tspan><tspan class="white"> Configured closed-loop pipeline</tspan></text>

    <!-- Steps visualization -->
    <g transform="translate(24, 264)">
      <text class="text accent" font-size="12" y="0">  O</text>
      <text class="text dim" font-size="12" x="26" y="0">bserve →</text>
      <text class="text purple" font-size="12" x="100" y="0">R</text>
      <text class="text dim" font-size="12" x="112" y="0">efine →</text>
      <text class="text accent" font-size="12" x="172" y="0">B</text>
      <text class="text dim" font-size="12" x="184" y="0">uild →</text>
      <text class="text purple" font-size="12" x="236" y="0">T</text>
      <text class="text dim" font-size="12" x="248" y="0">est →</text>
      <text class="text green" font-size="12" x="292" y="0">I</text>
      <text class="text dim" font-size="12" x="300" y="0">ntegrate →</text>
      <text class="text accent" font-size="12" x="384" y="0">↺</text>
    </g>

    <!-- Done message -->
    <text class="text" font-size="14" y="308"><tspan class="green">  Done!</tspan><tspan class="white"> Run </tspan><tspan class="accent">/orbti:help</tspan><tspan class="white"> to get started.</tspan></text>

    <!-- New prompt -->
    <text class="text prompt" font-size="14" y="352">~</text>
    <text class="text dim" font-size="14" x="16" y="352">$</text>
    <text class="text white" font-size="14" x="36" y="352">▌</text>
  </g>
</svg>